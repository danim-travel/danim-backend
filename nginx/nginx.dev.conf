upstream django {
    server django:8000;
}

server {
    listen 80;
    server_name dev-api.danim.kr;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name dev-api.danim.kr;

    ssl_certificate /etc/letsencrypt/live/dev-api.danim.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev-api.danim.kr/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    auth_basic "Dev Server";
    auth_basic_user_file /etc/nginx/.htpasswd;

    location / {
        # OPTIONS preflight 요청은 Basic Auth 면제 + 204 반환
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' 'https://dev.danim.kr';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept';
            add_header 'Access-Control-Allow-Credentials' 'true';
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Length' 0;
            return 204;
        }

        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /ws/ {
        proxy_pass http://django;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }
}
