services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: danim
      POSTGRES_USER: danim
      POSTGRES_PASSWORD: danim
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  django:
    build: .
    command: uv run python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
      - venv:/app/.venv
    ports:
      - "8000:8000"
    env_file:
      - envs/.env
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
  venv: