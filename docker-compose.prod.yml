services:
  django:
    image: ${DOCKER_USERNAME}/danim-backend:latest
    env_file:
      - envs/.env.prod
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
    expose:
      - "8000"
    depends_on:
      - redis
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - django
    restart: always

  redis:
    image: redis:7-alpine
    restart: always
