name: Deploy

on:
  workflow_run:
    workflows: ["Build"]
    types: [completed]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Get GitHub Actions runner IP
        id: ip
        run: echo "ip=$(curl -s https://api.ipify.org)" >> $GITHUB_OUTPUT

      - name: Open SSH port for runner
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id ${{ secrets.EC2_SECURITY_GROUP_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.ip.outputs.ip }}/32
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-northeast-2

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            cd ~/danim-backend
            git pull origin main

            # .env.prod 파일 생성
            echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" > envs/.env.prod
            echo "DB_HOST=${{ secrets.DB_HOST }}" >> envs/.env.prod
            echo "DB_NAME=${{ secrets.DB_NAME }}" >> envs/.env.prod
            echo "DB_USER=${{ secrets.DB_USER }}" >> envs/.env.prod
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> envs/.env.prod
            echo "DB_PORT=5432" >> envs/.env.prod
            echo "REDIS_URL=redis://redis:6379/1" >> envs/.env.prod
            echo "REDIS_AUTH_URL=redis://redis:6379/2" >> envs/.env.prod
            echo "ALLOWED_HOSTS=52.78.31.79" >> envs/.env.prod
            echo "CORS_ALLOWED_ORIGINS=http://52.78.31.79" >> envs/.env.prod

            # 새 이미지 pull 및 재시작
            docker pull ${{ secrets.DOCKER_USERNAME }}/danim-backend:latest
            export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f

      - name: Close SSH port
        if: always()
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id ${{ secrets.EC2_SECURITY_GROUP_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.ip.outputs.ip }}/32
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-northeast-2

      - name: Discord 배포 성공 알림
        if: success()
        run: |
          curl -H "Content-Type: application/json" \
          -d '{"content": "🚀 **배포 완료!**\n브랜치: main\n상태: 성공 ✅"}' \
          ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Discord 배포 실패 알림
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
          -d '{"content": "❌ **배포 실패!**\n브랜치: main\n확인이 필요합니다."}' \
          ${{ secrets.DISCORD_WEBHOOK_URL }}
