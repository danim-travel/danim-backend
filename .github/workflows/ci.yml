name: CI

on:
  pull_request:
    branches: [develop, main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --all-groups

      - name: black
        run: uv run black --check .

      - name: isort
        run: uv run isort --check-only .

      - name: mypy
        run: uv run mypy .

  test:
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:16
        env:
          POSTGRES_DB: danim
          POSTGRES_USER: danim
          POSTGRES_PASSWORD: danim
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run tests
        env:
          SECRET_KEY: test-secret-key
          DB_NAME: danim
          DB_USER: danim
          DB_PASSWORD: danim
          DB_HOST: localhost
          DB_PORT: 5432
          REDIS_URL: redis://localhost:6379/1
          REDIS_AUTH_URL: redis://localhost:6379/2
          DJANGO_SETTINGS_MODULE: config.settings.local
        run: |
          uv run coverage run -m pytest
          exit_code=$?
          if [ $exit_code -eq 5 ]; then exit 0; else exit $exit_code; fi
