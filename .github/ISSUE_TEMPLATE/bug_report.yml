name: Bug Report
description: 버그를 제보합니다.
title: "bug: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: 버그 설명
      description: 어떤 버그인지 간단히 설명해주세요.
      placeholder: 예) 로그인 후 메인 페이지로 이동하지 않음
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 재현 방법
      description: 버그를 재현하는 단계를 적어주세요.
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: 스크린샷
      description: 있다면 첨부해주세요.
    validations:
      required: false
